name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Print Go version
        run: go version

      - name: Build binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=readonly -o dist/myapp .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp-binary
          path: dist/myapp

  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Run tests
        run: go test -v ./...

  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: myapp-binary
          path: dist

      - name: Copy binary to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/myapp"
          target: "/tmp"

deploy:
  name: Deploy
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  needs: [test]
  runs-on: ubuntu-latest
  steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Copy project files to Droplet
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        source: "."
        target: "/opt/myapp"

    - name: Run Docker Compose
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          set -e
          cd /opt/myapp
          docker compose down
          docker compose up -d --build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            sudo mkdir -p ${{ secrets.APP_DIR }}/releases
            sudo mv /tmp/dist/myapp ${{ secrets.APP_DIR }}/releases/myapp-${{ github.sha }}
            sudo chmod +x ${{ secrets.APP_DIR }}/releases/myapp-${{ github.sha }}

            sudo ln -sfn ${{ secrets.APP_DIR }}/releases/myapp-${{ github.sha }} ${{ secrets.APP_DIR }}/current

            sudo systemctl restart myapp
            sudo systemctl status myapp --no-pager