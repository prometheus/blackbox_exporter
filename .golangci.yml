version: "2"
linters:
  default: none
  enable:
    - copyloopvar
    - durationcheck
    - govet
    - ineffassign
    - makezero
    - misspell
    - revive
    - sloglint
    - staticcheck
    - unconvert
    - wastedassign
  settings:
    govet:
      # Enable the composites analyzer (unkeyed struct literals) on top of the
      # default vet analyzers (which include unreachable). Neither is part of
      # `go test`'s built-in vet subset, so they otherwise go uncaught in CI.
      enable:
        - composites
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
formatters:
  exclusions:
    generated: lax
