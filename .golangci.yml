version: "2"
linters:
  default: none
  enable:
    - misspell
    - nilerr
    - revive
    - sloglint
    - staticcheck
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
formatters:
  exclusions:
    generated: lax
